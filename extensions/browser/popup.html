<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0b0f; color: #e5e7eb; padding: 20px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #7c3aed, #db2777); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .title { font-size: 18px; font-weight: 700; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 10px; color: #6b7280; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    input, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 9px 14px; color: #e5e7eb; font-size: 13px; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: rgba(124, 58, 237, 0.5); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-primary { width: 100%; padding: 11px; background: linear-gradient(135deg, #7c3aed, #db2777); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-bottom: 8px; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); color: #a78bfa; border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: rgba(124, 58, 237, 0.1); border-color: rgba(124, 58, 237, 0.5); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { font-size: 11px; color: #6b7280; margin-top: 10px; text-align: center; padding: 6px; border-radius: 8px; }
    .status.connected { color: #34d399; background: rgba(52,211,153,0.1); }
    .status.error { color: #f87171; background: rgba(248,113,113,0.1); }
    .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">M</div>
    <span class="title">MangaLens</span>
  </div>

  <div class="field">
    <label>Backend URL</label>
    <input type="text" id="apiUrl" value="http://localhost:8000" />
  </div>

  <div class="row">
    <div class="field">
      <label>From</label>
      <select id="sourceLang">
        <option value="ko">Korean</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
        <option value="th">Thai</option>
      </select>
    </div>
    <div class="field">
      <label>To</label>
      <select id="targetLang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="pt">Portuguese</option>
        <option value="ko">Korean</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="id">Indonesian</option>
        <option value="tl">Tagalog</option>
      </select>
    </div>
  </div>

  <button class="btn-primary" id="translateBtn">Translate All Images</button>
  <button class="btn-secondary" id="selectBtn">Click to Translate</button>

  <div class="divider"></div>
  <div class="status" id="status">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
