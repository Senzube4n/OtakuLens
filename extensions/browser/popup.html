<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111827; color: #e5e7eb; padding: 16px; }
    h1 { font-size: 18px; margin-bottom: 12px; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    input, select { width: 100%; background: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 8px 12px; color: #e5e7eb; font-size: 13px; outline: none; }
    input:focus, select:focus { border-color: #7c3aed; }
    button { width: 100%; padding: 10px; background: #7c3aed; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:hover { background: #6d28d9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 11px; color: #6b7280; margin-top: 8px; text-align: center; }
    .status.connected { color: #34d399; }
    .status.error { color: #f87171; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <h1>MangaLens</h1>

  <div class="field">
    <label>Backend URL</label>
    <input type="text" id="apiUrl" value="http://localhost:8000" />
  </div>

  <div class="row">
    <div class="field">
      <label>Source Language</label>
      <select id="sourceLang">
        <option value="ko">Korean</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="field">
      <label>Target Language</label>
      <select id="targetLang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="pt">Portuguese</option>
        <option value="ko">Korean</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
      </select>
    </div>
  </div>

  <button id="translateBtn">Translate This Page</button>
  <div class="status" id="status">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
